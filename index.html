<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STI Desktop</title>
    <style>
        /* --- 基础样式 --- */
        :root {
            --bg-color: #0d0d0d;
            --term-bg: rgba(20, 20, 20, 0.9);
            --term-header: #333;
            --text-color: #00ff41; /* 经典黑客绿 */
            --prompt-color: #00bfff; /* 提示符蓝色 */
            --white: #f0f0f0;
            --font-stack: 'Fira Code', 'Courier New', monospace;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-stack);
            overflow: hidden; /* 防止滚动条 */
            height: 100vh;
            width: 100vw;
            user-select: none; /* 防止选中文字影响拖拽 */
        }

        /* --- 背景 Canvas (数字雨) --- */
        #matrix-bg {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            opacity: 0.3; /* 让背景暗一点，不抢眼 */
        }

        /* --- 顶部状态栏 --- */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            border-bottom: 1px solid #333;
            z-index: 10;
            font-size: 14px;
            color: var(--white);
        }

        /* --- 终端窗口 --- */
        #terminal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* 初始居中 */
            width: 700px;
            height: 450px;
            background-color: var(--term-bg);
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            z-index: 20;
            border: 1px solid #333;
            backdrop-filter: blur(5px);
        }

        /* 终端标题栏 */
        .term-header {
            height: 30px;
            background: #1a1a1a;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            cursor: move; /* 拖拽手势 */
            border-bottom: 1px solid #333;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        .term-title {
            margin-left: 20px;
            color: #aaa;
            font-size: 12px;
        }

        /* 终端内容区 */
        .term-body {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            color: var(--white);
            font-size: 15px;
            cursor: text;
        }
        .term-resizer {
            position: absolute;
            width: 20px;
            height: 20px;
            right: -8px;
            bottom: -8px;
            cursor: se-resize;
            border-right: #888 solid 2px;
            border-bottom: #888 solid 2px;
            border-bottom-right-radius: 10px;
        }

        /* 滚动条样式 */
        .term-body::-webkit-scrollbar { width: 8px; }
        .term-body::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        /* 命令行交互 */
        .output-line { margin-bottom: 5px; line-height: 1.4; word-wrap: break-word; }
        .command-line { display: flex; align-items: center; }
        .prompt { color: var(--prompt-color); margin-right: 8px; font-weight: bold; }
        
        input#cmd-input {
            background: transparent;
            border: none;
            color: var(--white);
            font-family: var(--font-stack);
            font-size: 15px;
            flex: 1;
            outline: none;
        }

        /* 特殊颜色类 */
        .c-green { color: var(--text-color); }
        .c-cyan { color: #00bcd4; }
        .c-yellow { color: #ffeb3b; }
        .ascii-art { white-space: pre; color: var(--prompt-color); font-size: 12px; line-height: 1.2; }

    </style>
</head>
<body>

    <!-- 1. 背景数字雨 -->
    <canvas id="matrix-bg"></canvas>

    <!-- 2. 顶部栏 -->
    <div id="top-bar">
        <div>Applications</div>
        <div id="clock">Loading...</div>
    </div>

    <!-- 3. 终端窗口 -->
    <div id="terminal">
        <div class="term-header" id="drag-header">
            <div class="window-controls">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="term-title">root@stier:~</div>
        </div>
        <div class="term-body" id="term-body" onclick="document.getElementById('cmd-input').focus()">
            <div id="history">
                <div class="output-line">Welcome to STI-OS v1.0.0</div>
                <div class="output-line">System load: 0.02, 0.01, 0.00</div>
                <div class="output-line">Type <span class="c-yellow">'help'</span> to see available commands.</div>
                <br>
            </div>
            <div class="command-line">
                <span class="prompt">root@stier:~$</span>
                <input type="text" id="cmd-input" autocomplete="off" autofocus>
            </div>
        </div>
        <div class="term-resizer"></div>
    </div>

    <script>
        /* ------------------------------------------------
            1. 实时时钟功能
        ------------------------------------------------ */
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { hour12: false });
            const dateString = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            document.getElementById('clock').innerText = `${dateString} ${timeString}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        /* ------------------------------------------------
            2. Matrix 背景特效
        ------------------------------------------------ */
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');

        // 设置全屏
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; // 拖影效果
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0'; // 绿色文字
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random() * chars.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // 窗口大小改变时重置 Canvas
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        /* ------------------------------------------------
            3. 窗口拖拽功能
        ------------------------------------------------ */
        const terminal = document.getElementById('terminal');
        const header = document.getElementById('drag-header');

        // 移除初始的 transform，改用 top/left 定位，防止拖拽计算冲突
        // 在JS初始化时固定位置
        terminal.style.left = (window.innerWidth / 2 - 350) + 'px';
        terminal.style.top = (window.innerHeight / 2 - 225) + 'px';
        terminal.style.transform = 'none';

        let isDragging = false;
        let offsetX, offsetY;

        header.addEventListener('mousedown', (e) => {
            isDragging = true;
            offsetX = e.clientX - terminal.offsetLeft;
            offsetY = e.clientY - terminal.offsetTop;
            header.style.cursor = 'grabbing';
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                terminal.style.left = (e.clientX - offsetX) + 'px';
                terminal.style.top = (e.clientY - offsetY) + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            header.style.cursor = 'move';
        });

        /* ------------------------------------------------
            4. 窗口调整大小功能
        ------------------------------------------------ */

        const resizer = terminal.querySelector('.term-resizer');
        let isResizing = false;
        let startWidth, startHeight, startX, startY;
        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            startWidth = terminal.offsetWidth;
            startHeight = terminal.offsetHeight;
            startX = e.clientX;
            startY = e.clientY;
            e.preventDefault(); // 防止选中文本
        });
        document.addEventListener('mousemove', (e) => {
            if (isResizing) {
                const newWidth = startWidth + (e.clientX - startX);
                const newHeight = startHeight + (e.clientY - startY);
                terminal.style.width = newWidth + 'px';
                terminal.style.height = newHeight + 'px';
            }
        });
        document.addEventListener('mouseup', () => {
            isResizing = false;
        });

        /* ------------------------------------------------
            5. 终端逻辑与命令解析
        ------------------------------------------------ */
        const input = document.getElementById('cmd-input');
        const historyDiv = document.getElementById('history');
        const termBody = document.getElementById('term-body');

        // ASCII Art Logo
        const fastfetchArt = `
<span class="c-cyan">         __ </span>  <span class="c-green">root@stier</span>
<span class="c-cyan">        / / </span>  --------------
<span class="c-cyan">       / /  </span>  <span class="c-yellow">OS</span>: HTML5 Web Desktop
<span class="c-cyan">      / /   </span>  <span class="c-yellow">Kernel</span>: Browser Engine
<span class="c-cyan">     / /    </span>  <span class="c-yellow">Uptime</span>: Just now
<span class="c-cyan">    /  \\    </span>  <span class="c-yellow">Shell</span>: JS-Bash
<span class="c-cyan">   /    \\   </span>  <span class="c-yellow">Resolution</span>: ${window.innerWidth}x${window.innerHeight}
<span class="c-cyan">  / | |\\ \\  </span>  <span class="c-yellow">Memory</span>: Simulated 100%
<span class="c-cyan"> / /| | \\ \\ </span>
<span class="c-cyan">| | | | / / </span>
<span class="c-cyan">| | | |/ /  </span>
<span class="c-cyan">| | |   /   </span>
<span class="c-cyan">| | | | \\   </span>
<span class="c-cyan">| | | |\\ \\  </span>
<span class="c-cyan">| | | | \\ \\  </span>
<span class="c-cyan">| | | |  \\_\\</span>
<span class="c-cyan">| | | |     </span>
<span class="c-cyan">| | |_|     </span>
<span class="c-cyan">| |         </span>
<span class="c-cyan">|_|         </span>
`;

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const cmd = this.value.trim();
                
                // 1. 添加用户的输入历史
                const userLine = document.createElement('div');
                userLine.className = 'output-line';
                userLine.innerHTML = `<span class="prompt">root@stier:~$</span> ${cmd}`;
                historyDiv.appendChild(userLine);

                // 2. 处理命令
                processCommand(cmd.toLowerCase());

                // 3. 清空输入框并滚动到底部
                this.value = '';
                termBody.scrollTop = termBody.scrollHeight;
            }
        });

        function processCommand(cmd) {
            let output = '';

            switch(cmd) {
                case 'help':
                    output = `Available commands:<br>
  <span class="c-yellow">help</span>      Show this help message<br>
  <span class="c-yellow">clear</span>     Clear the terminal screen<br>
  <span class="c-yellow">date</span>      Show current date and time<br>
  <span class="c-yellow">ls</span>        List directory contents (fake)<br>
  <span class="c-yellow">whoami</span>    Print effective userid<br>
  <span class="c-yellow">fastfetch</span>  Show system info<br>
  <span class="c-yellow">reboot</span>    Reload the page<br>`;
                    break;
                case 'clear':
                    historyDiv.innerHTML = '';
                    return; // 直接返回，不添加空行
                case 'date':
                    output = new Date().toString();
                    break;
                case 'whoami':
                    output = 'root';
                    break;
                case 'ls':
                    output = '<span class="c-cyan">Documents</span>  <span class="c-cyan">Downloads</span>  <span class="c-cyan">Music</span>  <span class="c-cyan">Pictures</span>  notes.txt  script.js';
                    break;
                case 'fastfetch':
                    output = `<div class="ascii-art">${fastfetchArt}</div>`;
                    break;
                case 'reboot':
                    output = 'Rebooting system...';
                    setTimeout(() => location.reload(), 1000);
                    break;
                case '':
                    return;
                default:
                    output = `bash: ${cmd}: command not found`;
            }

            if (output) {
                const responseLine = document.createElement('div');
                responseLine.className = 'output-line';
                responseLine.innerHTML = output;
                historyDiv.appendChild(responseLine);
            }
        }
        
        // 保持输入框聚焦
        document.addEventListener('click', () => {
             // 只有当用户没有选中文本时才强制聚焦，方便用户复制
            if(window.getSelection().toString() === "") {
                input.focus();
            }
        });

    </script>
</body>
</html>

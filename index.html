<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STI Desktop</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div id="top-bar">
        <div>STI Desktop</div>
        <div id="clock">Loading...</div>
    </div>

    <div id="terminal">
        <div class="term-header" id="drag-header">
            <div class="term-title">user@stier:~</div>
        </div>
        <div class="term-body" id="term-body" onclick="document.getElementById('cmd-input').focus()">
            <div id="history">
                <div class="output-line">Welcome to STI-OS v1.0.0</div>
                <div class="output-line">System load: 0.02, 0.01, 0.00</div>
                <div class="output-line">Type <span class="c-yellow">'help'</span> to see available commands.</div>
                <br>
            </div>
            <div class="command-line">
                <span class="prompt">user@stier:~$</span>
                <input type="text" id="cmd-input" autocomplete="off" autofocus>
            </div>
        </div>
        <div class="term-resizer"></div>
    </div>
    
    <script src="js/main.js"></script>
</body>
</html>
